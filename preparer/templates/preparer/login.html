<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Preparer Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="card shadow-sm" style="width:360px">
    <div class="card-body p-4">
      <h5 class="card-title mb-4 fw-bold">&#128196; Tax Preparer Dashboard</h5>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div class="alert alert-{{ 'danger' if category == 'error' else category }} py-2">{{ message }}</div>
      {% endfor %}
      {% endwith %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Preparer Password</label>
          <input type="password" name="password" class="form-control" autofocus required>
        </div>
        <button type="submit" class="btn btn-dark w-100">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
