{% extends "base.html" %}
{% block title %}Forgot Password — Tax Portal{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <h2>&#128274; Reset Password</h2>
            <p>Enter your email address and we'll send you a reset code</p>
        </div>

        <form method="post" action="{{ url_for('auth.forgot_password') }}" novalidate>
            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" name="email" class="form-control"
                       value="{{ email or '' }}" required autocomplete="email"
                       placeholder="you@example.com" autofocus>
            </div>

            <button type="submit" class="btn btn-primary"
                    style="width:100%; justify-content:center; padding:12px; font-size:1rem; margin-top:8px;">
                Send Reset Code
            </button>
        </form>

        <hr class="divider">

        <div class="auth-footer">
            <a href="{{ url_for('auth.login') }}">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
