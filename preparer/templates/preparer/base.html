<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tax Preparer Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('preparer.static', filename='preparer/style.css') }}">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3 py-2">
  <span class="navbar-brand fw-bold">&#128196; Tax Preparer Dashboard</span>
  <div class="d-flex align-items-center gap-3">
    <!-- Year selector -->
    {% if current_year is defined %}
    <form class="d-flex gap-1" method="get" id="year-form">
      <label class="text-white-50 small align-self-center me-1">Tax Year</label>
      <select name="year" class="form-select form-select-sm" style="width:100px"
              onchange="document.getElementById('year-form').submit()">
        {% for y in tax_years %}
        <option value="{{ y }}" {% if y == current_year %}selected{% endif %}>{{ y }}</option>
        {% endfor %}
      </select>
    </form>
    {% endif %}
    <a href="{{ url_for('preparer.settings') }}" class="btn btn-outline-light btn-sm">&#9881; Settings</a>
    <a href="{{ url_for('prep_auth.logout') }}" class="btn btn-outline-light btn-sm">Sign out</a>
  </div>
</nav>

<div class="container-fluid py-4 px-4">

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('preparer.static', filename='preparer/dashboard.js') }}"></script>
</body>
</html>
