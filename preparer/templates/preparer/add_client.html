{% extends "preparer/base.html" %}

{% block title %}Add Client — Tax Preparer Dashboard{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">

    <div class="d-flex align-items-center mb-4 gap-3">
      <a href="{{ url_for('preparer.client_list') }}" class="btn btn-outline-secondary btn-sm">&larr; Back</a>
      <h4 class="fw-bold mb-0">Add Client</h4>
    </div>

    <form method="post" action="{{ url_for('preparer.add_client_save') }}">

      <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold">Client Info</div>
        <div class="card-body">

          <div class="row g-3 mb-3">
            <div class="col">
              <label for="first_name" class="form-label">First Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="first_name" name="first_name" required autofocus>
            </div>
            <div class="col">
              <label for="last_name" class="form-label">Last Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="last_name" name="last_name" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="filing_status" class="form-label">Filing Status <span class="text-danger">*</span></label>
            <select class="form-select" id="filing_status" name="filing_status" onchange="toggleSpouse(this.value)">
              <option value="single">Single</option>
              <option value="mfj">Married Filing Jointly (MFJ)</option>
              <option value="mfs">Married Filing Separately (MFS)</option>
              <option value="hoh">Head of Household (HOH)</option>
              <option value="qw">Qualifying Widow(er) (QW)</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email"
                   placeholder="Leave blank to auto-generate">
            <div class="form-text">If left blank, a placeholder email will be created automatically.</div>
          </div>

          <div class="mb-1">
            <label for="phone" class="form-label">Phone</label>
            <input type="text" class="form-control" id="phone" name="phone" placeholder="Optional">
          </div>

        </div>
      </div>

      <!-- Spouse section — shown only for MFJ / MFS -->
      <div class="card shadow-sm mb-4" id="spouse-section" style="display:none !important">
        <div class="card-header fw-semibold">Spouse Info</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col">
              <label for="spouse_first_name" class="form-label">Spouse First Name</label>
              <input type="text" class="form-control" id="spouse_first_name" name="spouse_first_name">
            </div>
            <div class="col">
              <label for="spouse_last_name" class="form-label">Spouse Last Name</label>
              <input type="text" class="form-control" id="spouse_last_name" name="spouse_last_name"
                     placeholder="Defaults to client's last name">
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-dark">Add Client</button>
        <a href="{{ url_for('preparer.client_list') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>

    </form>
  </div>
</div>

<script>
function toggleSpouse(val) {
  const sec = document.getElementById('spouse-section');
  if (val === 'mfj' || val === 'mfs') {
    sec.style.removeProperty('display');
  } else {
    sec.style.setProperty('display', 'none', 'important');
  }
}
</script>
{% endblock %}
